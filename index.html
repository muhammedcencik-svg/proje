<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayram Harçlığı Kutusu</title>
    <style>
        /* Genel Arka Plan: Modern bir degrade (gradient) */
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 20px; 
            min-height: 100vh;
            margin: 0;
        }

        /* Profil Fotoğrafı: Daha büyük ve parlayan çerçeve */
        .profile-img { 
            width: 150px; 
            height: 150px; 
            border-radius: 50%; 
            border: 5px solid white; 
            object-fit: cover; 
            margin-bottom: 15px; 
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3);
            transition: transform 0.3s ease;
        }
        .profile-img:hover { transform: scale(1.05);
         } 
         img scr = "junyer.jpg" alt="Profil Fotoğrafı" class="profile-img">
         {
             width: 150px; 
             height: 150px; 
             border-radius: 50%; 
             border: 5px solid white; 
             object-fit: cover; 
             margin-bottom: 15px; 
             box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3);
             transition: transform 0.3s ease;
         }
        }

        h2 { color: #2c3e50; margin-bottom: 30px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }

        /* Kartlar: Daha büyük, daha geniş ve şık gölgeli */
        .card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px); /* Cam efekti */
            width: 100%; 
            max-width: 500px; /* Genişlik arttı */
            padding: 35px;    /* İç boşluk arttı */
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            margin-bottom: 25px; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.3);
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); }

        .bank-name { 
            font-weight: 800; 
            font-size: 1.6em; 
            color: #2ecc71; 
            margin-bottom: 15px; 
            letter-spacing: 1px;
        }

        /* IBAN Alanı: Daha belirgin */
        .iban { 
            background: #f8f9fa; 
            padding: 15px; 
            border-radius: 12px; 
            font-family: 'Courier New', monospace; 
            font-size: 1.1em; 
            font-weight: bold;
            display: block; 
            margin-bottom: 20px; 
            color: #34495e;
            border: 1px dashed #2ecc71;
            word-break: break-all;
        }

        /* Buton: Büyük ve etkileyici */
        button { 
            background: linear-gradient(to right, #2ecc71, #27ae60); 
            color: white; 
            border: none; 
            padding: 15px 25px; 
            border-radius: 12px; 
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer; 
            transition: 0.3s; 
            width: 100%; 
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
        }
        button:hover { 
            background: linear-gradient(to right, #27ae60, #2ecc71); 
            box-shadow: 0 8px 20px rgba(46, 204, 113, 0.6);
            transform: scale(1.02);
        }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>  
    <img src="junyer.jpeg" alt="junyer.jpeg" class="profile-img">
    <h2>ALAH RIZASI için bu <u>ögrenciye</u> Bayram Harçlığı🍬</h2>

<div class="card">
        <div class="bank-name">ZİRAAT BANKASI</div>
        <span class="iban" id="iban1">TR82 0001 0090 1096 06
        <button onclick="copyIban('iban1')">IBAN Kopyala</button>
    </div>

    <div class="card">
        <div class="bank-name">YAPI KREDİ</div>
        <span class="iban" id="iban2">TR070006701000000024232124</span>
        <button onclick="copyIban('iban2')">IBAN Kopyala</button>
    </div>

    <div class="card">
        <div class="bank-name">AK BANK</div>
        <span class="iban" id="iban3">TR26 0004 6001 8888 8000 2254 00</span>
        <button onclick="copyIban('iban3')">IBAN Kopyala</button>
    </div>

    <script>
        function copyIban(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            
            // Daha şık bir bildirim için butonu geçici olarak değiştiriyoruz
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "Kopyalandı! ✅";
            btn.style.background = "#34495e";
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "";
            }, 2000);
        }
    </script>

</body>
</html>
